<!doctype html><html lang="te"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR L5 Admin</title><link rel="stylesheet" href="style.css"></head><body>
<header class="hero"><div><h1>KSR L5 Enterprise Admin</h1><p>Smart Parser • Validation • Real Exam Preview</p></div><a class="btn ghost" href="index.html">Student Page</a></header>
<main class="wrap grid2">
<section class="card"><h2>1. Exam Details</h2><label>Exam Title<input id="examTitle" placeholder="DSC Grand Test"></label><label>Time Minutes<input id="examTime" type="number" value="60"></label><label>Questions Paste Area<textarea id="rawQuestions" rows="16" placeholder="1. Question text&#10;A) Option&#10;B) Option ●&#10;C) Option&#10;D) Option"></textarea></label><div class="actions"><button class="btn" onclick="parseNow()">Parse & Validate</button><button class="btn success" onclick="saveExam()">Save Exam</button><button class="btn warn" onclick="loadSample()">Sample</button></div></section>
<section class="card"><h2>2. Health Monitor</h2><div id="health" class="health"><div>Total Questions: 0</div><div>Issues: 0</div><div>Status: Waiting</div></div><div id="issues"></div><h3>Saved Exams</h3><div id="savedList"></div></section>
<section class="card wide"><h2>3. Admin Real Exam Preview</h2><div id="preview"></div></section>
</main><script src="ksr-parser-l5.js"></script><script src="storage.js"></script><script src="admin.js"></script></body></html>

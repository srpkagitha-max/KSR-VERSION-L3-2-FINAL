<!DOCTYPE html>
<html lang="te">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KSR Admin L3.3 Time Final</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="header"><div class="wrap top"><div><div class="brand">KSR Online Exam Platform</div><div class="sub">Version L3.3 Time Final Admin</div></div><a class="headlink" href="index.html">Student Page</a></div></div>
<div class="wrap">
<div id="loginCard" class="card"><h2>Admin Login</h2><label>Email</label><input id="email" placeholder="admin email"><label>Password</label><input id="pass" type="password" placeholder="password"><button class="p" id="loginBtn">Login</button><p id="loginMsg" class="small"></p></div>
<div id="app" class="hide">
<div class="card top"><h2>Admin Dashboard</h2><button class="d" id="logoutBtn">Logout</button></div>
<div class="tabs card"><button class="tab active" data-view="create">Create Exam</button><button class="tab" data-view="exams">Exams List</button><button class="tab" data-view="students">Students</button><button class="tab" data-view="reports">Reports</button></div>
<section id="view-create" class="view card"><h2>Create Exam</h2><div class="grid"><div><label>Exam ID</label><input id="examId" value="DSC001"></div><div><label>Exam Title</label><input id="examTitle" value="Mock Test"></div></div><div class="grid"><div><label>Start Time</label><input id="startTime" type="datetime-local"></div><div><label>End Time</label><input id="endTime" type="datetime-local"></div></div><div class="grid"><div><label>Seconds / Question</label><input id="sec" type="number" value="45"></div><div><label>Marks / Question</label><input id="marks" type="number" value="1"></div></div><label>Codes Count</label><input id="count" type="number" value="20"><label>Questions</label><textarea id="bits" placeholder="1. Question text?
A. Option 1
B. Option 2
C. Option 3
D. Option 4
Answer: B"></textarea><button class="p" id="saveExamBtn">Save Exam + Generate Codes</button><pre id="codesBox"></pre></section>
<section id="view-exams" class="view card hide"><h2>Exams List</h2><button class="s" id="loadExamsBtn">Load Exams</button><div id="examsBox"></div></section>
<section id="view-students" class="view card hide"><h2>Students / Attempts</h2><label>Exam ID</label><input id="studentsExamId" value="DSC001"><button class="s" id="loadStudentsBtn">Load Students</button><button class="o" id="exportStudentsBtn">Export CSV</button><div id="studentsBox"></div></section>
<section id="view-reports" class="view card hide"><h2>Reports + Rank List</h2><label>Exam ID</label><input id="reportExamId" value="DSC001"><button class="s" id="loadResultsBtn">Load Results</button><button class="o" id="exportResultsBtn">Export CSV</button><div id="rankStatsBox" class="stat-grid"></div><div id="resultsBox"></div></section>
</div></div><script type="module" src="admin.js?v=l33time"></script></body></html>

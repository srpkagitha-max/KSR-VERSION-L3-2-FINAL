<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KSR Online Exam Platform</title>
<link rel="stylesheet" href="style.css?v=parserv2c">
</head>
<body>
<div class="header"><div class="wrap top">
  <div><div class="brand">KSR Online Exam Platform</div><div class="sub">Student Page</div></div>
  <a class="navlink" href="admin.html">Admin</a>
</div></div>
<div class="wrap">
  <div id="loginCard" class="card">
    <h2>Student Login</h2>
    <label>Name</label><input id="name" placeholder="Student name">
    <label>Phone</label><input id="phone" placeholder="Phone number">
    <label>Student Photo URL (optional)</label><input id="photo" placeholder="Paste photo link optional">
    <label>Exam ID</label><input id="examId" value="DSC001">
    <label>Exam Code</label><input id="code" placeholder="Exam code">
    <button class="p" id="startBtn">Start Exam</button><button class="s" id="hallBtn">Hall Ticket</button>
    <p id="msg"></p>
  </div>
  <div id="exam" class="card hide">
    <div class="top"><h2 id="examTitle">Exam</h2><h2 id="timer">00:00</h2></div>
    <div id="qBox"></div>
    <div><button class="s" id="prevBtn">Previous</button><button class="s" id="markBtn">Mark</button><button class="s" id="nextBtn">Next</button><button class="p" id="submitBtn">Submit</button></div>
    <h3>Palette</h3><div id="palette"></div>
  </div>
  <div id="result" class="card hide"></div>
</div>
<script type="module" src="student.js?v=parserv2c"></script>
</body></html>
